<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#14110D">
    <title>Page Not Found · DAVAUS</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .not-found {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
        }
        .not-found-content { max-width: 520px; }
        .not-found-code {
            font-family: var(--font-display);
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 600;
            color: var(--primary);
            line-height: 1;
            font-style: italic;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }
        .not-found h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); margin-bottom: 16px; }
        .not-found p { color: var(--cream); margin-bottom: 32px; font-family: var(--font-display); font-style: italic; }
        .not-found-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="not-found">
        <div class="not-found-content">
            <div class="not-found-code">404</div>
            <h1>That page wandered off.</h1>
            <p>Looks like the row we were planting in doesn't exist. Let's head back to where things grow.</p>
            <div class="not-found-actions">
                <a href="/" class="btn btn-primary">Back to home</a>
                <a href="/#contact" class="btn btn-outline">Get in touch</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/config.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/components.js"></script>
</body>
</html>
