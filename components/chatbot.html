<!-- JARVIS, Davaus product assistant -->
<div class="chatbot-container">
    <div class="chatbot-label">
        <span class="chatbot-label-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;color:var(--primary);">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
            Ask Jarvis
        </span>
        <span class="chatbot-label-subtitle">Davaus product assistant</span>
    </div>
    <button class="chatbot-btn" id="jarvisBtn" aria-label="Open Jarvis chat assistant">
        <span class="chatbot-btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
        </span>
        <span class="chatbot-btn-text">Jarvis</span>
    </button>
</div>

<div class="chatbot-window" id="jarvisWindow">
    <div class="chatbot-header">
        <span class="chatbot-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
            Jarvis <span style="font-size: 0.7em; opacity: 0.7; font-weight: 400;">Product assistant</span>
        </span>
        <button class="chatbot-close" id="jarvisClose" aria-label="Close chat">&times;</button>
    </div>
    <div class="chatbot-messages" id="jarvisMessages"></div>
    <div class="chatbot-input-area">
        <textarea class="chatbot-input" id="jarvisInput" placeholder="Ask about SeedRight, Kernel Keeper, Ride Tamer..." rows="1"></textarea>
        <button class="chatbot-send" id="jarvisSend" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>
